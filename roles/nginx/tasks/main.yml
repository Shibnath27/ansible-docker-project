- name: Install Nginx
  apt:
    name: nginx
    state: present

- name: Deploy config
  template:
    src: app-proxy.conf.j2
    dest: /etc/nginx/conf.d/app.conf
  notify: Reload Nginx

- name: Start Nginx
  service:
    name: nginx
    state: started
    enabled: true

- name: Test Nginx configuration
  command: nginx -t
  changed_when: false
