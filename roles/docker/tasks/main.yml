# Install aptitude so Ansible can manage packages more reliably
- name: Install aptitude
  apt:
    name: aptitude
    state: latest
    update_cache: true

# Install packages required before Docker can be added
- name: Install required system packages
  apt:
    pkg:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - python3-pip
          - virtualenv
          - python3-setuptools
    state: latest
    update_cache: true

# Add Docker's official GPG key to verify package integrity
- name: Add Docker GPG apt Key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

# Register the official Docker APT repository as a package source
- name: Add Docker Repository
  apt_repository:
        repo: "deb https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

# Install the Docker CE package from the Docker repository
- name: Update apt and install docker-ce
  apt:
        name: docker-ce
        state: latest
        update_cache: true

# Install the Python Docker SDK so Ansible can communicate with Docker
- name: Install Docker Module for Python
  pip:
        name: docker
        executable: pip3

# Install Docker Compose v2 as an APT plugin (replaces standalone binary)
- name: Install Docker Compose plugin
  apt:
    name: docker-compose-plugin
    state: latest
    update_cache: true

- name: Reload systemd
  command: systemctl daemon-reload
  changed_when: false

- name: Start and enable Docker
  service:
    name: docker
    state: started
    enabled: true

- name: Add deploy user to docker group
  user:
    name: ubuntu
    groups: docker
    append: yes

- name: Login to Docker Hub
  community.docker.docker_login:
    username: "{{ vault_docker_username }}"
    password: "{{ vault_docker_password }}"
  when: vault_docker_username is defined

- name: Pull image
  community.docker.docker_image:
    name: "{{ docker_app_image }}"
    tag: "{{ docker_app_tag }}"
    source: pull

- name: Run container
  community.docker.docker_container:
    name: "{{ docker_app_name }}"
    image: "{{ docker_app_image }}:{{ docker_app_tag }}"
    state: started
    restart_policy: always
    ports:
      - "{{ docker_app_port }}:{{ docker_container_port }}"

- name: Wait for container to be healthy
  uri:
    url: "http://localhost:{{ docker_app_port }}"
    status_code: 200
  retries: 5
  delay: 3
  register: health_check
  until: health_check.status == 200
